syntax = "proto3";

package message;

service EmailService {
  rpc SendEmail (EmailRequest) returns (EmailResponse);
}

// Mensaje de solicitud.
message EmailRequest {
  string id = 1;
  string subject = 2;
  string body = 3;
  string sender = 4;
  repeated string recipients = 5;
}

// Mensaje de respuesta.
message EmailResponse {
  string message = 1;
  bool success = 2;
}
