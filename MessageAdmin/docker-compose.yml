version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: message_admin_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=message_admin
    restart: unless-stopped
    healthcheck:
      test: mongosh --eval 'db.adminCommand("ping")' > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Para activar el servicio MessageAdmin, elimina los comentarios de estas líneas
